[colors.cursor]
cursor = "#8caaee"

[cursor.style]
blinking = "Always"

[env]
TERM = "xterm-256color"

[window]
decorations = "Buttonless"

[window.padding]
x = 9
y = 6

[[keyboard.bindings]]
chars = "\u001B[27;5;9~"
key = "Tab"
mods = "Control"

[general]
import = ["~/.config/alacritty/catppuccin/catppuccin-frappe.toml", "~/.config/alacritty/font.toml", "~/.config/alacritty/local.toml"]
