# screen like command prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# reload config
bind C-r source-file ~/.tmux.conf

# status bar
set-option -g status-position top
set-option -g status-right "[#S]"
set-option -g status-left ""
set -g window-status-current-format "#{window_index}:#{b:pane_current_path}#{window_flags} "
set -g window-status-format "#{window_index}:#{b:pane_current_path}#{window_flags} "
setw -g pane-border-status top
setw -g pane-border-format "─"
set -g status-style "bg=default,fg=black"

# new panes will inherit the current working dir
bind '"' split-window -c "#{pane_current_path}" -l "34%"
bind % split-window -h -c "#{pane_current_path}" -l "50%"

# vim mode
set-window-option -g mode-keys vi

set -g default-terminal "xterm-256color"

# for neovim
set -sg terminal-overrides ",*:RGB"

# key handling stuff
set-option -g xterm-keys on
set -s escape-time 0

# larger buffer
set -g history-limit 1000000

# window switching
set -g mouse on
bind r choose-tree -w -Z
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5

# start window and pane indices at 1 for better switching; and always close gaps
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# scratchpad
bind s display-popup -E -h '85%' -w '85%'
bind S display-popup -E -d '/tmp' -h '85%' -w '85%'
bind t display-popup -E -h '85%' -w '85%' ghci

# pane resizing
bind = resize-pane -x '50%' -y '50%'
bind k resize-pane -U 5
bind j resize-pane -D 5
bind h resize-pane -L 10
bind l resize-pane -R 10
bind 6 resize-pane -y '66%'

# pane selection and highlight
bind-key -n C-Tab if-shell "test #{window_panes} -gt 1" "select-pane -l" "send-keys C-y"
bind-key -n C-y if-shell "test #{window_panes} -gt 1" "select-pane -l" "send-keys C-y"
bind-key -T copy-mode-vi C-Tab select-pane -l
bind-key -T copy-mode-vi C-y select-pane -l
set -g pane-active-border-style "fg=black"
set -g pane-border-style "fg=black"
set -g pane-border-indicators "arrows"

# make copy mode more intuitive (aka vim-like)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
